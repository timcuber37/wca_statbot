<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Delegate - WCA StatBot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">WCA StatBot</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/delegate" class="nav-link active">Ask a Delegate</a>
                <a href="/about" class="nav-link">About</a>
                <a href="https://github.com/timcuber37/wca_statbot" target="_blank" rel="noopener" class="nav-link nav-link-external">
                    GitHub
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                </a>
                <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Sign In</button>
            </div>
        </div>
    </nav>

    <div class="container delegate-container">
        <div class="delegate-header">
            <h1>Ask a Delegate</h1>
            <p class="subtitle">Get answers about the WCA Regulations and Guidelines, grounded in the official text with citations.</p>
            <div class="delegate-disclaimer">
                <strong>Informational only.</strong> Not a substitute for a real WCA Delegate's ruling at a competition.
            </div>
        </div>

        <div id="chat" class="chat-thread">
            <div id="starters" class="starter-questions">
                <p class="starter-label">Try one of these to get started:</p>
                <div class="starter-grid">
                    <button class="starter-btn" data-q="What is a +2 penalty and when is it given?">What is a +2 penalty and when is it given?</button>
                    <button class="starter-btn" data-q="What is the time limit rule for 3x3?">What is the time limit rule for 3x3?</button>
                    <button class="starter-btn" data-q="How are DNFs handled in an Average of 5?">How are DNFs handled in an Average of 5?</button>
                    <button class="starter-btn" data-q="Can a competitor use earplugs during an attempt?">Can a competitor use earplugs during an attempt?</button>
                </div>
            </div>
        </div>

        <div id="guest-meta" class="guest-meta hidden"></div>

        <form id="ask-form" class="ask-form">
            <div class="ask-bar">
                <input type="text" id="question" placeholder="Ask about the WCA Regulations…" autocomplete="off" required>
                <button type="submit" id="ask-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
            <button type="button" id="reset-btn" class="reset-btn">Clear conversation</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = '{{ supabase_url }}';
        const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';
        const MAX_GUEST_QUESTIONS = {{ max_guest_questions }};
        const REGS_URL = 'https://www.worldcubeassociation.org/regulations';

        let sbClient = null;
        let currentUser = null;
        let messages = JSON.parse(sessionStorage.getItem('delegate_messages') || '[]');
        let isLoading = false;

        if (SUPABASE_URL && SUPABASE_ANON_KEY) {
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            sbClient.auth.getSession().then(({ data: { session } }) => {
                currentUser = session?.user || null;
                updateAuthUI();
                updateGuestMeta();
            });
            sbClient.auth.onAuthStateChange((event, session) => {
                currentUser = session?.user || null;
                updateAuthUI();
                updateGuestMeta();
            });
        } else {
            updateAuthUI();
            updateGuestMeta();
        }

        function updateAuthUI() {
            const btn = document.getElementById('auth-btn');
            if (currentUser) {
                const name = currentUser.user_metadata?.full_name || currentUser.email || 'Profile';
                btn.textContent = name;
                btn.onclick = () => { window.location.href = '/profile'; };
            } else {
                btn.textContent = 'Sign In';
                btn.onclick = handleAuth;
            }
        }

        function handleAuth() {
            window.location.href = currentUser ? '/profile' : '/login';
        }

        function guestUsage() {
            return parseInt(localStorage.getItem('delegate_guest_count') || '0', 10);
        }

        function bumpGuestUsage() {
            localStorage.setItem('delegate_guest_count', String(guestUsage() + 1));
        }

        function updateGuestMeta() {
            const meta = document.getElementById('guest-meta');
            if (currentUser) {
                meta.classList.add('hidden');
                return;
            }
            const used = guestUsage();
            const remaining = Math.max(0, MAX_GUEST_QUESTIONS - used);
            meta.classList.remove('hidden');
            if (remaining > 0) {
                meta.innerHTML = `Guest mode: <strong>${remaining}</strong> of ${MAX_GUEST_QUESTIONS} questions remaining. <a href="/login">Sign in</a> for unlimited.`;
            } else {
                meta.innerHTML = `Guest limit reached. <a href="/login">Sign in</a> to continue.`;
            }
        }

        function renderMessages() {
            const chat = document.getElementById('chat');
            const starters = document.getElementById('starters');
            if (messages.length === 0) {
                starters.style.display = '';
                chat.querySelectorAll('.msg, .sources, .typing').forEach(n => n.remove());
                return;
            }
            starters.style.display = 'none';
            chat.querySelectorAll('.msg, .sources, .typing').forEach(n => n.remove());
            for (const m of messages) {
                appendMessageNode(m);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
        }

        function linkifyCitations(text) {
            // Match [9b1] or [9b1+] style markers (one or many, comma-separated allowed)
            return escapeHtml(text).replace(/\[([0-9A-Z][a-zA-Z0-9]*\+?(?:,\s*[0-9A-Z][a-zA-Z0-9]*\+?)*)\]/g, (match, ids) => {
                const parts = ids.split(/,\s*/).map(id => {
                    const url = `${REGS_URL}/#${id}`;
                    return `<a href="${url}" target="_blank" rel="noopener" class="citation">${id}</a>`;
                });
                return `[${parts.join(', ')}]`;
            });
        }

        function appendMessageNode(m) {
            const chat = document.getElementById('chat');
            const wrap = document.createElement('div');
            wrap.className = `msg msg-${m.role}`;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = m.role === 'assistant' ? linkifyCitations(m.content) : escapeHtml(m.content);
            wrap.appendChild(bubble);
            chat.appendChild(wrap);

            if (m.role === 'assistant' && m.sources && m.sources.length) {
                const det = document.createElement('details');
                det.className = 'sources';
                const summary = document.createElement('summary');
                summary.textContent = `Sources (${m.sources.length})`;
                det.appendChild(summary);
                for (const s of m.sources) {
                    const item = document.createElement('div');
                    item.className = 'source-item';
                    const kindTag = s.kind === 'guideline' ? 'Guideline' : 'Regulation';
                    item.innerHTML = `<div class="source-head"><a href="${s.url}" target="_blank" rel="noopener">[${s.regulation_id}]</a> <span class="source-kind source-${s.kind}">${kindTag}</span> <span class="source-article">Article ${escapeHtml(String(s.article_num || ''))}: ${escapeHtml(s.article_title || '')}</span></div><div class="source-body">${escapeHtml(s.content)}</div>`;
                    det.appendChild(item);
                }
                chat.appendChild(det);
            }
        }

        function persist() {
            sessionStorage.setItem('delegate_messages', JSON.stringify(messages));
        }

        function showTyping() {
            const chat = document.getElementById('chat');
            const wrap = document.createElement('div');
            wrap.className = 'msg msg-assistant typing';
            wrap.innerHTML = '<div class="msg-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
            chat.appendChild(wrap);
            chat.scrollTop = chat.scrollHeight;
        }

        function clearTyping() {
            document.querySelectorAll('.typing').forEach(n => n.remove());
        }

        async function askQuestion(question) {
            if (isLoading) return;
            if (!currentUser && guestUsage() >= MAX_GUEST_QUESTIONS) {
                alert('Guest limit reached. Please sign in to continue.');
                return;
            }

            isLoading = true;
            document.getElementById('ask-btn').disabled = true;

            const userMsg = { role: 'user', content: question };
            messages.push(userMsg);
            persist();
            renderMessages();
            showTyping();

            try {
                const resp = await fetch('/api/delegate/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        history: messages.slice(0, -1).map(m => ({ role: m.role, content: m.content })),
                    }),
                });
                clearTyping();
                const data = await resp.json();
                if (!resp.ok) {
                    messages.push({ role: 'assistant', content: data.error || 'Sorry, something went wrong.' });
                } else {
                    messages.push({ role: 'assistant', content: data.answer, sources: data.sources });
                    if (!currentUser) bumpGuestUsage();
                }
            } catch (err) {
                clearTyping();
                messages.push({ role: 'assistant', content: 'Network error — please try again.' });
            } finally {
                persist();
                renderMessages();
                updateGuestMeta();
                isLoading = false;
                document.getElementById('ask-btn').disabled = false;
            }
        }

        document.getElementById('ask-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('question');
            const q = input.value.trim();
            if (!q) return;
            input.value = '';
            askQuestion(q);
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if (messages.length && !confirm('Clear the conversation?')) return;
            messages = [];
            persist();
            renderMessages();
        });

        document.querySelectorAll('.starter-btn').forEach(btn => {
            btn.addEventListener('click', () => askQuestion(btn.dataset.q));
        });

        renderMessages();
    </script>
</body>
</html>
