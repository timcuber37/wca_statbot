<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SpeedCubeMuse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">SpeedCubeMuse</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/delegate" class="nav-link">Ask a Delegate</a>
                <a href="/about" class="nav-link">About</a>
                <a href="https://github.com/timcuber37/wca_statbot" target="_blank" rel="noopener" class="nav-link nav-link-external" aria-label="GitHub">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">SpeedCubeMuse</h1>
            <p class="login-subtitle">Sign in to save queries and track your results</p>

            <div class="login-providers">
                <button class="provider-btn google" onclick="signInWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </button>

                <button class="provider-btn wca" onclick="signInWithWCA()">
                    <img src="{{ url_for('static', filename='wca_logo.png') }}" width="20" height="20" alt="WCA logo">
                    Sign in with WCA
                </button>
            </div>

            <div id="login-error" class="login-error" style="display:none"></div>

            <a href="/" class="login-back">Back to home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = '{{ supabase_url }}';
        const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';
        let sbClient = null;

        if (SUPABASE_URL && SUPABASE_ANON_KEY) {
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Listen for auth state changes (handles OAuth redirect tokens)
            sbClient.auth.onAuthStateChange((event, session) => {
                if (session?.user) window.location.href = '/profile';
            });

            // If already signed in, redirect to profile
            sbClient.auth.getSession().then(({ data: { session } }) => {
                if (session?.user) window.location.href = '/profile';
            });
        }

        function signInWithGoogle() {
            if (!sbClient) return;
            sbClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/login' }
            });
        }

        function signInWithWCA() {
            window.location.href = '/auth/wca';
        }

        // Show any error returned by the WCA OAuth callback.
        const errorParam = new URLSearchParams(window.location.search).get('error');
        if (errorParam) {
            const messages = {
                wca_not_configured: 'WCA sign-in is not configured yet.',
                invalid_state: 'Authentication request expired. Please try again.',
                no_code: 'WCA did not return an authorization code.',
                token_exchange_failed: 'Failed to exchange authorization code.',
                no_access_token: 'WCA did not return an access token.',
                user_info_failed: 'Failed to fetch your WCA profile.',
                no_email: 'Your WCA account has no public email address.',
                user_creation_failed: 'Failed to create your account. Please try again.',
                login_link_failed: 'Failed to create your session. Please try again.',
            };
            const el = document.getElementById('login-error');
            el.textContent = messages[errorParam] || 'Sign-in failed. Please try again.';
            el.style.display = 'block';
        }
    </script>
</body>
</html>
